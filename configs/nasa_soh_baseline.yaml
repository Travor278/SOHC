# BatteryML 风格的 SOH 训练配置（v0.2 W1 baseline，NASA 同源）

dataset:
  name: NASA_PCoE
  paths:
    pcoe: data/nasa_pcoe/B000x/    # B0005-B0018，主集
    arc:  data/nasa_pcoe/ARC-FY08Q4/  # 多温度多倍率，补充
  val_ratio: 0.2
  split_by: cell_id    # 按电池编号分训练/验证集

model:
  type: variance       # baseline：手工特征 + Ridge（BatteryML 自带）
  # 后续可换：cnn / mlp / mamba（W4 创新点）

train:
  epochs: 100
  batch_size: 32
  optimizer: adam
  learning_rate: 1.0e-3
  early_stop_patience: 10

target:
  type: SOH
  scale: percentage    # 0~100
  reference_capacity: fresh_cell  # SOH = current_capacity / fresh_capacity

logging:
  out_dir: outputs/runs/nasa_soh_baseline
  save_best_only: true
